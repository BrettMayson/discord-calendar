name: Build

on:
  push:
    branches: [main]

permissions:
  packages: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: calendar

      - run: cargo build --release

      - run: cp target/release/discal-xyz ./discal-xyz

      - name: Build Image
        run: docker build . -t calendar

      - name: Tag Image
        run: docker tag calendar ghcr.io/brettmayson/discal-xyz:latest

      - name: Push Image
        run: docker push ghcr.io/brettmayson/discal-xyz:latest
